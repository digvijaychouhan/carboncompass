<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarbonCompass — Institutional Compliance Matrix</title>
  
  <!-- Premium Editorial Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght=0,600;0,700;1,400&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg: #ffffff;            /* Pure white background */
      --surface: #fafafa;       /* Subtle light gray for data rows */
      --sidebar-bg: #0f1011;    /* Clean, stark black sidebar */
      --sidebar-text: #e4e4e7;  /* High-contrast light text for sidebar menu */
      --border: #111111;        /* Thick, deep authoritative structural layout lines */
      --border-muted: #e5e5e7;  /* Clean light divider line */
      --text: #000000;          /* Crisp high-density black text for maximum reading */
      --muted: #555555;         /* Professional slate gray for descriptions */
      --accent: #222222;        /* Stark, minimalist deep charcoal selection tint */
      --accent-light: #f4f4f5;  /* Neutral light tint for tag highlights */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; line-height: 1.6;
      -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh; overflow: hidden;
    }

    /* ── LEFT SIDEBAR DASHBOARD ── */
    aside {
      width: 290px; background: var(--sidebar-bg); color: var(--sidebar-text);
      display: flex; flex-direction: column; border-right: 2px solid var(--border);
      flex-shrink: 0; z-index: 10; position: relative;
    }
    
    .sidebar-brand { padding: 2rem 1.5rem; border-bottom: 1px solid #27272a; }
    .sidebar-brand h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: #ffffff; }
    .sidebar-brand p { font-size: 0.72rem; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }

    .search-box-wrapper { padding: 1.25rem 1.5rem; border-bottom: 1px solid #27272a; }
    .sidebar-search {
      width: 100%; font-family: inherit; font-size: 0.85rem; padding: 0.6rem 0.85rem;
      border: 1px solid #3f3f46; background: #18181b; color: #ffffff; border-radius: 4px;
    }
    .sidebar-search:focus { outline: none; border-color: #ffffff; }

    /* Sidebar Navigation Links */
    .sidebar-menu { list-style: none; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .menu-item button {
      width: 100%; background: none; border: none; color: #a1a1aa; text-align: left;
      padding: 0.8rem 1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      border-radius: 6px; transition: all 0.15s ease; display: flex; justify-content: space-between; align-items: center;
    }
    .menu-item button:hover { color: #ffffff; background: #27272a; }
    .menu-item button.active { color: #ffffff; background: var(--accent); }
    .menu-counter { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 0.15rem 0.4rem; border-radius: 10px; color: #d4d4d8; }

    .sidebar-footer { margin-top: auto; padding: 1.5rem; border-top: 1px solid #27272a; font-size: 0.75rem; color: #71717a; }

    /* ── MAIN CONTENT SYSTEM ── */
    main { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); }
    
    /* Live Pricing Ribbon */
    .top-ribbon {
      background: var(--surface); border-bottom: 1px solid var(--border-muted);
      padding: 0.75rem 2.5rem; display: flex; gap: 3rem; align-items: center; font-size: 0.82rem;
    }
    .ribbon-item { display: flex; gap: 0.5rem; }
    .ribbon-label { font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.02em; }
    .ribbon-value { font-weight: 700; color: var(--text); }

    .content-viewport { padding: 3rem 2.5rem; max-width: 1100px; width: 100%; margin: 0 auto; }
    
    .view-header { margin-bottom: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 1.25rem; }
    .view-header h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--text); }
    .view-header p { color: var(--muted); font-size: 1rem; margin-top: 0.35rem; }

    /* ── SUB-NAV INTERACTIVE TOGGLES ── */
    .sub-nav { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-muted); padding-bottom: 1rem; }
    .sub-nav button {
      background: var(--surface); border: 1px solid var(--border-muted); color: var(--muted);
      padding: 0.5rem 1.25rem; font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border-radius: 4px; transition: all 0.2s;
    }
    .sub-nav button.active {
      background: var(--border); color: var(--bg); border-color: var(--border);
    }

    /* ── DATA STYLING ── */
    .table-container { width: 100%; border: 1px solid var(--border); background: var(--bg); }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    .data-table th { background: var(--border); color: var(--bg); padding: 0.85rem 1.25rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .data-table td { padding: 1.25rem; border-bottom: 1px solid var(--border-muted); vertical-align: top; line-height: 1.6; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface); }

    .text-bold { font-weight: 700; color: var(--text); }
    .text-tag { display: inline-block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; background: var(--accent-light); color: var(--text); padding: 0.15rem 0.5rem; border: 1px solid var(--border-muted); }

    @media (max-width: 992px) {
      body { flex-direction: column; overflow: auto; }
      aside { width: 100%; border-right: none; border-bottom: 2px solid var(--border); }
      main { overflow-y: visible; }
      .top-ribbon { display: none; }
      .content-viewport { padding: 1.75rem; }
    }
  </style>
</head>
<body>

  <!-- LEFT SIDEBAR CONTROL PANEL -->
  <aside>
    <div class="sidebar-brand">
      <h1>CarbonCompass</h1>
      <p>Institutional Knowledge Hub</p>
    </div>
    
    <div class="search-box-wrapper">
      <input type="text" id="matrixSearch" class="sidebar-search" placeholder="Filter current data pool..." onkeyup="handleSearch()" />
    </div>

    <ul class="sidebar-menu">
      <li class="menu-item"><button class="active" onclick="switchCategory('market', this)">1. Market Landscape <span class="menu-counter" id="count-market">0</span></button></li>
      <li class="menu-item"><button onclick="switchCategory('frameworks', this)">2. Core Frameworks <span class="menu-counter" id="count-frameworks">0</span></button></li>
      <li class="menu-item"><button onclick="switchCategory('services', this)">3. Service Lines <span class="menu-counter" id="count-services">0</span></button></li>
      <li class="menu-item"><button onclick="switchCategory('certifications', this)">4. Certifications Registry <span class="menu-counter" id="count-certifications">0</span></button></li>
      <li class="menu-item"><button onclick="switchCategory('economics', this)">5. Financial Benchmarks <span class="menu-counter" id="count-economics">0</span></button></li>
    </ul>

    <div class="sidebar-footer">
      &copy; 2026 CarbonCompass Network.<br>Internal Hub Environment.
    </div>
  </aside>

  <!-- WORKSPACE VIEWPORT -->
  <main>
    <!-- Live Carbon Price Indicator Ribbon -->
    <div class="top-ribbon">
      <div class="ribbon-item"><span class="ribbon-label">EU Allowance (EUA) Spot:</span><span class="ribbon-value" id="eua-ticker">€74.82</span></div>
      <div class="ribbon-item"><span class="ribbon-label">UK Allowance (UKA):</span><span class="ribbon-value">£42.15</span></div>
      <div class="ribbon-item"><span class="ribbon-label">Global Carbon Index:</span><span class="ribbon-value">$26.40</span></div>
    </div>

    <div class="content-viewport">
      <!-- Title Block -->
      <div class="view-header">
        <h2 id="view-title">Market Landscape</h2>
        <p id="view-desc">Quantitative baseline metrics driving regional climate compliance asset pricing.</p>
      </div>

      <!-- Segment Selection Sub-Navigation Toggle -->
      <div class="sub-nav">
        <button id="btn-dataset" class="active" onclick="switchSubView('dataset')">📊 Baseline Datasets</button>
        <button id="btn-blueprint" onclick="switchSubView('blueprint')">📋 Blueprint Perspectives</button>
      </div>

      <!-- Main Data Table Node -->
      <div class="table-container">
        <table class="data-table">
          <thead id="table-head-target"></thead>
          <tbody id="table-body-target"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- DATA MATRIX CONTROL SYSTEM -->
  <script>
    const dataVault = {
      market: {
        title: "Market Sizing & Structural Demands",
        desc: "Quantitative baseline metrics driving global and regional climate compliance asset pricing.",
        dataset: {
          headers: ["Indicator Element", "Data Benchmark", "Advisory Implication"],
          items: [
            { c1: "India Steel Exports to EU", c2: "~USD 4.4 – 4.6 Billion / Year", c3: "Large established trade exposure framework facing strict regulatory transitions." },
            { c1: "India's Share of Total CBAM Costs", c2: "~18% of Projected Global Total", c3: "Disproportionate fiscal impact expected due to higher carbon footprint production lines." },
            { c1: "Indian Steel Carbon Intensity", c2: "2.5 t CO2 / t Steel vs EU 1.5-1.8 t", c3: "Significant footprint intensity delta creates massive financial liabilities under incoming tariff boundaries." },
            { c1: "FY2025 Indian Steel Export Volume", c2: "-24.4% YoY Decline", c3: "Signals immediate compliance or market pricing adaptation pressures before full enforcement rules kick in." }
          ]
        },
        blueprint: {
          headers: ["Strategic Shift", "Operational Focus", "System Imperative"],
          items: [
            { c1: "Static Documentation Trends", c2: "Moving away from traditional annual retroactive summaries.", c3: "Requires direct ongoing tracking pipelines mapping carbon variables across active supply lines." },
            { c1: "Assurance Modeling Requirements", c2: "Development of verifiable carbon logging structures.", c3: "Exporters must provide reliable, structured evidence chains to handle international trade checkpoints cleanly." }
          ]
        }
      },
      frameworks: {
        title: "Interlocking Knowledge Domains",
        desc: "Regulatory frameworks and auditing guidelines required to engineer third-party verifiable emission tracking systems.",
        dataset: {
          headers: ["Regulatory Framework", "Compliance Class", "Core Operational Focus"],
          items: [
            { c1: "CBAM (EU Regulation 2023/956)", c2: "Mandatory Transnational", c3: "Requires complete documentation of direct embedded carbon across steel, aluminum, cement, and fertilizers. Uses harsh default baseline penalties for non-compliance." },
            { c1: "ISO 14064 Framework Series", c2: "Global Audit Standard", c3: "Standard 14064-1 outlines organization greenhouse gas boundaries; 14064-2 controls project-level reductions; 14064-3 builds verification verification scripts." },
            { c1: "GHG Protocol Standards", c2: "Methodological Baseline", c3: "The universal accounting standard mapping out Scope 1 (Direct), Scope 2 (Purchased Energy), and Scope 3 (Value Chain Categorization) carbon definitions." }
          ]
        },
        blueprint: {
          headers: ["Framework Integration", "Core Technical Objective", "Intended Outcome"],
          items: [
            { c1: "ISO Methodology Mapping", c2: "Translating architectural rules into structured validation criteria.", c3: "Allows regular verification exercises to run consistently without needing manual, unstructured re-evaluations." },
            { c1: "Framework Interlocking Architecture", c2: "Aligning reporting structures with standard tracking parameters.", c3: "Establishes unified validation records that satisfy intersecting regional reporting requirements simultaneously." }
          ]
        }
      },
      services: {
        title: "Commercial Service Line Architectures",
        desc: "Operational advisory playbooks, fee structure boundaries, and addressable enterprise targets.",
        dataset: {
          headers: ["Service Advisory Domain", "Standard Fee Boundary", "Target Market Entity"],
          items: [
            { c1: "CBAM Compliance Advisory", c2: "€20,000 – €60,000 / Project", c3: "Industrial trade manufacturers exporting over 50 metric tonnes of regulated goods annually into EU zones." },
            { c1: "Internal Carbon Pricing Strategy", c2: "€15,000 – €40,000 / Engagement", c3: "Corporate CFOs and Capital Allocation teams seeking to build internal Marginal Abatement Cost (MAC) curves." },
            { c1: "Offset Quality Risk Portfolios", c2: "€5,000 – €20,000 / Audit", c3: "Enterprise firms navigating Net-Zero milestones looking to weed out unverified or high-risk carbon tokens." }
          ]
        },
        blueprint: {
          headers: ["Advisory Adaptation", "Traditional Form", "Evolved Framework Strategy"],
          items: [
            { c1: "Continuous Advisory Retainers", c2: "Standard episodic advisory engagements.", c3: "Setting up structured tracking systems to capture and evaluate operational data points continuously." },
            { c1: "Carbon Risk Tracking Provisioning", c2: "Isolating calculations to static document snapshots.", c3: "Providing systemic validation tools that calculate operational risk variables instantly during logistics routing." }
          ]
        }
      },
      certifications: {
        title: "Named Educational Provider Registry",
        desc: "Accredited verification pathways and professional training options mapped by actual cost requirements.",
        dataset: {
          headers: ["Credential Program", "Named Registry Provider", "Estimated Capital Expense"],
          items: [
            { c1: "ISO 14064 Lead Verifier Training", c2: "Bureau Veritas India", c3: "INR 25,000 – 60,000 (5-Day Intensive Virtual or On-Premise Class)" },
            { c1: "ISO 14064 GHG Lead Auditor Course", c2: "SGS India / Global Registry", c3: "USD 800 – 1,500 (32 Hours Modular Verification Architecture)" },
            { c1: "Product Life Cycle Standard Suite", c2: "GHG Protocol Store", c3: "USD 600 (Self-Paced Strategic Product-Level Carbon Calculation Curriculum)" }
          ]
        },
        blueprint: {
          headers: ["Competency Transitions", "Historical Skill Focus", "Evolving Requirement Profile"],
          items: [
            { c1: "Systemic Evidence Verification", c2: "Reviewing physical logs and isolated record sheets manually.", c3: "Evaluating core data pipelines and structured verification environments." },
            { c1: "Cross-Border Reporting Architectures", c2: "Analyzing regional tracking setups in isolation.", c3: "Structuring centralized frameworks that fulfill overlapping international standards smoothly." }
          ]
        }
      },
      economics: {
        title: "Engagement Economics & Independent Day Rates",
        desc: "Compensation baselines spanning private independent specialist consultant networks and corporate leadership bands.",
        dataset: {
          headers: ["Professional Consulting Tier", "Global Base Day Rate Target", "India Local Equivalent Target"],
          items: [
            { c1: "Independent Senior Specialist", c2: "£800 – £1,500 / Day Value", c3: "INR 70,000 – 130,000 / Day Value (High corporate premium for technical implementation)" },
            { c1: "ISO 14065 Accredited Auditor", c2: "£1,200 – £2,500 / Day Value", c3: "INR 100,000 – 200,000 / Day Value (Extremely scarce talent pipeline commanding top tier validation fees)" },
            { c1: "Senior Advisory Consultant (Employed)", c2: "£75,000 – £110,000 / Year Base", c3: "INR 1,500,000 – 3,000,000 / Year Base (Standard practice lead framework within Big 4 style networks)" }
          ]
        },
        blueprint: {
          headers: ["Value Multiplier", "Baseline Capability Metric", "Specialist Implementation Target"],
          items: [
            { c1: "Integration Strategy Expertise", c2: "Standard assessment mapping routines.", c3: "Direct design and orchestration of foundational tracking architectures." }
          ]
        }
      }
    };

    let activeCategory = 'market';
    let activeSubView = 'dataset';

    function switchCategory(catKey, elementBtn) {
      activeCategory = catKey;
      
      document.querySelectorAll('.sidebar-menu button').forEach(btn => btn.classList.remove('active'));
      elementBtn.classList.add('active');

      document.getElementById('view-title').innerText = dataVault[catKey].title;
      document.getElementById('view-desc').innerText = dataVault[catKey].desc;

      renderCurrentTable();
    }

    function switchSubView(subKey) {
      activeSubView = subKey;
      
      document.getElementById('btn-dataset').classList.remove('active');
      document.getElementById('btn-blueprint').classList.remove('active');
      document.getElementById(`btn-${subKey}`).classList.add('active');

      renderCurrentTable();
    }

    function renderCurrentTable() {
      const activeDataPool = dataVault[activeCategory][activeSubView];
      const searchString = document.getElementById('matrixSearch').value.toLowerCase();
      
      const headTarget = document.getElementById('table-head-target');
      headTarget.innerHTML = `<tr>${activeDataPool.headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

      const filteredItems = activeDataPool.items.filter(item => 
        item.c1.toLowerCase().includes(searchString) || 
        item.c2.toLowerCase().includes(searchString) || 
        item.c3.toLowerCase().includes(searchString)
      );

      const bodyTarget = document.getElementById('table-body-target');
      if (filteredItems.length === 0) {
        bodyTarget.innerHTML = `<tr><td colspan="3" style="color: var(--muted); text-align: center; padding: 3rem;">No entries found matching current filter query parameters.</td></tr>`;
        return;
      }

      bodyTarget.innerHTML = filteredItems.map(item => `
        <tr>
          <td class="text-bold">${item.c1}</td>
          <td><span class="text-tag">${item.c2}</span></td>
          <td style="color: var(--muted);">${item.c3}</td>
        </tr>
      `).join('');
    }

    function runCounterEngine() {
      const searchString = document.getElementById('matrixSearch').value.toLowerCase();
      
      Object.keys(dataVault).forEach(key => {
        const count = dataVault[key][activeSubView].items.filter(item => 
          item.c1.toLowerCase().includes(searchString) || 
          item.c2.toLowerCase().includes(searchString) || 
          item.c3.toLowerCase().includes(searchString)
        ).length;

        document.getElementById(`count-${key}`).innerText = count;
      });
    }

    function handleSearch() {
      renderCurrentTable();
      runCounterEngine();
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderCurrentTable();
      runCounterEngine();
    });
  </script>
</body>
</html>
