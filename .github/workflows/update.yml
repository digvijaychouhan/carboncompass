name: Daily Climate News Update

on:
  schedule:
    # Runs at 6:00 AM IST (00:30 UTC) every day
    - cron: '30 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Fetch latest climate news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push updated news
        run: |
          git config --global user.name 'CarbonCompass Bot'
          git config --global user.email 'bot@carboncompass'
          git add data/news.json
          git diff --staged --quiet || git commit -m "🌿 Auto-update: Climate news $(date +'%Y-%m-%d')"
          git push
